# FlutLab's cloud builder has limited RAM. A huge heap (the old -Xmx8G/4G
# metaspace) makes the OS OOM-killer terminate the Gradle daemon mid-build
# ("Gradle build daemon disappeared unexpectedly"). These conservative settings
# keep the build inside the memory budget so assembleRelease can finish.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.configureondemand=false
org.gradle.workers.max=2
android.useAndroidX=true
android.enableJetifier=true
